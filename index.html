<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل المسلسلات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 15px;
        }

        #video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 15px;
            background: #111;
            box-shadow: 0 4px 20px rgba(255,255,255,0.1);
            border: none;
        }

        .video-list {
            margin-top: 30px;
            width: 100%;
        }

        .video-item {
            padding: 15px;
            background: #1a1a1a;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .video-item:hover { background: #333; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://images.icon-icons.com/1063/PNG/96/camcorder_256_icon-icons.com_76838.png" alt="Icon" class="header-icon">
    
    <iframe id="video-player" src="" allowfullscreen></iframe>

    <div id="list" class="video-list"></div>
</div>

<script>
    async function loadVideos() {
        try {
            // تأكد أن هذا الرابط هو رابط ملف .nt في مستودعك
            const response = await fetch('https://raw.githubusercontent.com/abdelahidz/FILME/main/videos.nt');
            const data = await response.text();
            
            const videos = data.split('\n').filter(line => line.trim() !== '');
            const listDiv = document.getElementById('list');
            const player = document.getElementById('video-player');

            videos.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = 'video-item';
                div.innerText = 'حلقة ' + (index + 1);
                div.onclick = () => {
                    // تحويل رابط Vimeo العادي إلى رابط embed للعمل داخل الموقع
                    let videoId = url.split('/').pop().split('?')[0];
                    player.src = 'https://player.vimeo.com/video/' + videoId;
                };
                listDiv.appendChild(div);
            });
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
        }
    }

    loadVideos();
</script>

</body>
</html>
