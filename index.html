<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الواجهة السوداء</title>
    <!-- استدعاء خط Cairo من جوجل ليعمل بشكل صحيح -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;900&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الخلفية السوداء الداكنة جداً وتوسيط المحتوى */
        body {
            background-color: #050505; /* لون أسود داكن جداً بناءً على طلبك */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column; /* لترتيب الصورة في الأعلى والأزرار بالأسفل */
            justify-content: flex-start; /* تم التعديل لرفع المحتوى والصورة إلى الأعلى قليلاً */
            align-items: center;
            gap: 20px; /* تقليل المسافة الإجمالية لتتناسب مع النص الجديد */
            min-height: 100vh; /* ملء الشاشة بالكامل */
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        /* تنسيق حاوية الصورة العلوية */
        .top-image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px; /* إزاحة بسيطة من السقف العلوي للشاشة */
            margin-bottom: 5px; 
        }

        .top-image-container img {
            max-width: 100%;
            height: auto;
            max-height: 250px; /* تحديد أقصى ارتفاع مريح للعين */
            border-radius: 8px; /* حواف دائرية خفيفة للصورة العلوية */
            object-fit: contain;
        }

        /* تنسيق النص الذهبي أسفل الصورة */
        .subtitle-text {
            font-family: 'Cairo', sans-serif;
            font-weight: 300; /* وزن الخط المطلوب */
            font-size: 30px; /* حجم الخط المطلوب (300 تم تطبيقها كوزن وحجم متناسق 30px) */
            color: #FFD700; /* لون ذهبي ناصع ومميز */
            margin: 0 0 30px 0; /* مسافة أسفل النص لتبتعد الأزرار عنه */
            text-align: center;
        }

        /* حاوية الأزرار للحفاظ على تنسيقها الأفقي */
        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; /* إضافة مسافة مناسبة بين الأزرار */
            flex-wrap: wrap; /* للسماح بنزول الأزرار لسطر جديد على الشاشات الصغيرة جداً */
        }

        /* تنسيق رابط الزر */
        .app-button {
            display: inline-block;
            transition: transform 0.2s ease; /* تأثير سلس عند التمرير */
        }

        /* التحكم في حجم الصورة (الزر) */
        .app-button img {
            width: 32px;
            height: 32px;
            display: block;
            border-radius: 50%; /* لجعل حواف الأيقونة دائرية ومتناسقة */
            object-fit: cover;
        }

        /* تأثير خفيف عند تحريك الماوس فوق الزر */
        .app-button:hover {
            transform: scale(1.1); /* تكبير الزر قليلاً بنسبة 10% */
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- الصورة العلوية المضافة حديثاً (تم رفع موقعها للأعلى) -->
    <div class="top-image-container">
        <img src="https://www.emaratalyoum.com/polopoly_fs/1.1749156.1684417912!/image/image.jpg" alt="Top Banner Image">
    </div>

    <!-- النص الذهبي بخط كايرو والوزن المطلوب أسفل الصورة مباشرة -->
    <div class="subtitle-text">شاهد جميع مباريات</div>

    <!-- حاوية تجمع الأزرار الخمسة معاً -->
    <div class="buttons-container">
        <!-- الزر الأول الأساسي (تم تعديل الرابط بنجاح هنا) -->
        <a href="https://koorasport.net/" 
           target="_blank" 
           class="app-button" 
           title="الانتقال إلى كورة سبورت">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKfUBw8bk2OnjvG_syR611uW0aSB8XfcqBcDzSLLHC6A&s=10" alt="Button 1">
        </a>

        <!-- الزر الثاني -->
        <a href="https://koorasport.net/" 
           target="_blank" 
           class="app-button" 
           title="الانتقال إلى كورة سبورت">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1jdWIYRCfKycpQ2RJIlTNFKSsCWDlZJZt57lDJFTgUQ&s=10" alt="Button 2">
        </a>

        <!-- الزر الثالث -->
        <a href="https://m.syrlive.com/" 
           target="_blank" 
           class="app-button" 
           title="الانتقال إلى سير لايف">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhBr8HgE9s3VvHqnbLfnvblnZrwQrO3rUhKG8swSpfTQ&s=10" alt="Button 3">
        </a>

        <!-- الزر الرابع -->
        <a href="https://www.livegoaltv.com/" 
           target="_blank" 
           class="app-button" 
           title="الانتقال إلى لايف جول تي في">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQ-OLoJOMJ7vdOfxVuEngoWy6B71pFFpbOGGjLFXtNWQ&s=10" alt="Button 4">
        </a>

        <!-- الزر الخامس الجديد -->
        <a href="https://freedomgloryproject.com/" 
           target="_blank" 
           class="app-button" 
           title="الانتقال إلى فريدوم جلوري">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS13mbFtMXsED-8i9UvdgqfD7WEM-eeW3QljPXvWvePrw&s=10" alt="Button 5">
        </a>
    </div>

</body>
</html>
